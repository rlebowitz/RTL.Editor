<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>RTL Editor</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f0f0f0;
        }

        #toolbar {
            background: #333;
            color: white;
            padding: 6px;
            display: flex;
            gap: 8px;
            align-items: center;
            direction: ltr; 
        }

            #toolbar button {
                padding: 4px 8px;
                border: none;
                background: #555;
                color: white;
                cursor: pointer;
            }

                #toolbar button:hover {
                    background: #777;
                }

        #editor {
            padding: 12px;
            height: calc(100vh - 40px);
            box-sizing: border-box;
            background: white;
            direction: rtl;
            unicode-bidi: plaintext;
            text-align: right;
            font-size: 18px;
            line-height: 1.6;
        }

            #editor:focus {
                outline: none;
            }
    </style>
</head>
<body>
    <div id="toolbar">
        <button onclick="document.execCommand('bold')"><b>B</b></button>
        <button onclick="document.execCommand('italic')"><i>I</i></button>
        <button onclick="document.execCommand('underline')"><u>U</u></button>
        <button onclick="setDir('rtl')">RTL</button>
        <button onclick="setDir('ltr')">LTR</button>
    </div>
    <div id="editor" contenteditable="true">
        שלום עולם! זהו עורך טקסט RTL בתוך WebView2.
    </div>

    <script>
    const editor = document.getElementById('editor');

    function setDir(dir) {
        editor.style.direction = dir;
        editor.style.textAlign = (dir === 'rtl') ? 'right' : 'left';
    }

    function notifyChange() {
        const msg = {
            type: 'contentChanged',
            html: editor.innerHTML
        };
        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.postMessage(msg);
        }
    }

    editor.addEventListener('input', notifyChange);
    </script>
</body>
</html>
