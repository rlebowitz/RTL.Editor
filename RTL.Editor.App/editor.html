<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>RTL Editor</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f0f0f0;
        }

        #toolbar {
            background: #333;
            color: white;
            padding: 6px;
            display: flex;
            gap: 8px;
            align-items: center;
            direction: ltr;
        }

            #toolbar button {
                padding: 4px 8px;
                border: none;
                background: #555;
                color: white;
                cursor: pointer;
            }

                #toolbar button:hover {
                    background: #777;
                }

        #editor {
            padding: 12px;
            height: calc(100vh - 40px);
            box-sizing: border-box;
            background: white;
            direction: rtl;
            unicode-bidi: plaintext;
            text-align: right;
            font-size: 18px;
            line-height: 1.6;
        }

            #editor:focus {
                outline: none;
            }
    </style>
</head>
<body>
    <div id="toolbar">
        <button onclick="document.execCommand('bold')"><b>B</b></button>
        <button onclick="document.execCommand('italic')"><i>I</i></button>
        <button onclick="document.execCommand('underline')"><u>U</u></button>
        <button onclick="pasteTextAtCursor()">Rev</button>
        <button onclick="setDir('rtl')">RTL</button>
        <button onclick="setDir('ltr')">LTR</button>
    </div>
    <div id="editor" contenteditable="true">
        שלום עולם! זהו עורך טקסט RTL בתוך WebView2.
    </div>

    <script>
        const editor = document.getElementById('editor');

        var d = {};
        d['a'] = 'א';
        d['b'] = 'ב';
        d['g'] = 'ג';
        d['d'] = 'ד';
        d['h'] = 'ה';
        d['v'] = 'ו';
        d['z'] = 'ז';
        d['x'] = 'ח';
        d['j'] = 'ט';
        d['y'] = 'י';
        d['k'] = 'כ';
        d['K'] = 'ך';
        d['l'] = 'ל';
        d['m'] = 'מ';
        d['M'] = 'ם';
        d['n'] = 'נ';
        d['N'] = 'ן';
        d['s'] = 'ס';
        d['w'] = 'ע';
        d['p'] = 'פ';
        d['P'] = 'ף';
        d['c'] = 'צ';
        d['C'] = 'ץ';
        d['q'] = 'ק';
        d['r'] = 'ר';
        d['i'] = 'ש';
        d['t'] = 'ת';

        function getInnerHTML() {
            return editor ? editor.innerHTML : '';
        }

        function setDir(dir) {
            editor.style.direction = dir;
            editor.style.textAlign = (dir === 'rtl') ? 'right' : 'left';
        }

        function notifyChange() {
            const msg = {
                type: 'contentChanged',
                html: editor.innerHTML
            };
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(msg);
            }
        }

        editor.addEventListener('input', notifyChange);

        // Function to replace characters in a string based on a mapping
        function replaceChars(str) {
            if (typeof str !== "string") {
                throw new TypeError("Input must be a string");
            }

            let result = "";

            // Loop through each character
            for (let i = 0; i < str.length; i++) {
                const char = str[i];
                // If the character exists in the mapping, replace it; otherwise keep it
                result += replacements.hasOwnProperty(char) ? replacements[char] : char;
            }

            return result;
        }

        function pasteTextAtCursor() {
            try {
                // Request clipboard text
                debugger;
                let text = await navigator.clipboard.readText();
                if (!text) {
                    console.warn("No clipboard text found.");
                    return;
                }
                // Transform the text using the mapping
                let result = replaceChars(text);
                // Display it

                const sel = window.getSelection();

                // Ensure there is a valid selection and range
                if (!sel || sel.rangeCount === 0) {
                    console.warn("No selection found.");
                    return;
                }

                const range = sel.getRangeAt(0);
                range.deleteContents(); // Remove any selected text

                // Create a text node for the inserted text
                const textNode = document.createTextNode(text);

                // Insert the text node at the cursor
                range.insertNode(textNode);

                // Move the caret after the inserted text
                range.setStartAfter(textNode);
                range.setEndAfter(textNode);

                // Update the selection to the new range
                sel.removeAllRanges();
                sel.addRange(range);

            } catch (err) {
                console.error('Failed to read clipboard: ', err);
            }
    </script>
</body>
</html>
